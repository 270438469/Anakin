# Codex configuration for OpenClaw (C++/CMake project)
# Usage:
#   codex --config openclaw.codex.toml

[project]
name = "openclaw"
language = "cpp"
description = "OpenClaw (Captain Claw) modernized engine/project automation profile."

[environment]
shell = "bash"
working_directory = "."

[repository]
default_branch = "main"

[build]
configure = [
  "cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo"
]
compile = [
  "cmake --build build -j"
]

[test]
commands = [
  "ctest --test-dir build --output-on-failure"
]

[lint]
commands = [
  "cmake --build build --target clang-format || true",
  "cmake --build build --target clang-tidy || true"
]

[run]
# Keep this aligned with the executable name generated by your CMakeLists.txt.
command = "./build/openclaw"

[guardrails]
# Prefer minimal, reviewable edits.
max_files_per_change = 12
require_tests_for_code_changes = true
avoid_mass_formatting = true

[[guardrails.paths]]
path = "assets"
mode = "read_only"
reason = "Game assets are large/binary and should not be modified by default."

[[guardrails.paths]]
path = "third_party"
mode = "read_only"
reason = "Vendored dependencies should only be updated intentionally."

[style]
# Keep style rules explicit so Codex can follow project conventions.
notes = [
  "Use C++17 unless the repo explicitly requires another standard.",
  "Prefer RAII and standard library containers over raw owning pointers.",
  "Keep functions focused; avoid unrelated refactors in the same patch.",
  "When touching gameplay logic, add/update a regression test when possible."
]

[git]
commit_convention = "Conventional Commits"
commit_examples = [
  "feat(engine): add SDL2 fullscreen toggle support",
  "fix(audio): guard null sample handle in mixer"
]

[docs]
update_readme_when_commands_change = true
include_migration_notes_for_breaking_changes = true
